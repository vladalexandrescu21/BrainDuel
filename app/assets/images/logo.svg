<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 140" width="520" height="140">
  <defs>
    <!-- Main brand gradient: purple → cyan -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <!-- Horizontal gradient for text accent -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#67E8F9"/>
    </linearGradient>
    <!-- Radial glow for icon background -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3B1D8A" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0D1B2A" stop-opacity="1"/>
    </radialGradient>
    <!-- Soft glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#7C3AED" flood-opacity="0.4"/>
    </filter>
    <!-- Clip circle for brain -->
    <clipPath id="iconClip">
      <circle cx="70" cy="70" r="58"/>
    </clipPath>
  </defs>

  <!-- ═══ ICON BADGE ════════════════════════════════════════════════════ -->

  <!-- Outer glow ring -->
  <circle cx="70" cy="70" r="63" fill="none" stroke="url(#brandGrad)" stroke-width="1.5" opacity="0.3"/>

  <!-- Icon background -->
  <circle cx="70" cy="70" r="58" fill="url(#bgGlow)" filter="url(#shadow)"/>

  <!-- Gradient border -->
  <circle cx="70" cy="70" r="58" fill="none" stroke="url(#brandGrad)" stroke-width="2.5"/>

  <!-- ═══ BRAIN SILHOUETTE (top-down view, symmetric) ════════════════════ -->
  <!--
    Top view brain: two cerebral hemispheres divided by a central line.
    Outer contour built from smooth bezier curves.
    Fold lines suggest the cortex texture.
  -->

  <!-- OUTER BRAIN SHAPE -->
  <path
    d="
      M 70 22
      C 82 22 92 28 96 37
      C 100 44 100 50 97 57
      C 94 64 94 68 96 74
      C 98 80 96 88 89 93
      C 84 97 78 98 74 97
      C 72 96 71 95 70 95
      C 69 95 68 96 66 97
      C 62 98 56 97 51 93
      C 44 88 42 80 44 74
      C 46 68 46 64 43 57
      C 40 50 40 44 44 37
      C 48 28 58 22 70 22 Z
    "
    fill="none"
    stroke="url(#brandGrad)"
    stroke-width="2.8"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- CENTER DIVISION LINE -->
  <line x1="70" y1="22" x2="70" y2="95" stroke="url(#brandGrad)" stroke-width="2" opacity="0.8" stroke-dasharray="3 2"/>

  <!-- LEFT HEMISPHERE — inner fold lines -->
  <path d="M 53 32 C 48 36 46 42 48 50"
    fill="none" stroke="#A78BFA" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <path d="M 44 54 C 44 60 47 65 50 68"
    fill="none" stroke="#A78BFA" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <path d="M 53 74 C 56 78 60 80 62 83"
    fill="none" stroke="#A78BFA" stroke-width="1.6" stroke-linecap="round" opacity="0.6"/>
  <path d="M 47 42 C 52 38 56 38 58 42"
    fill="none" stroke="#A78BFA" stroke-width="1.4" stroke-linecap="round" opacity="0.5"/>

  <!-- RIGHT HEMISPHERE — inner fold lines (mirrored) -->
  <path d="M 87 32 C 92 36 94 42 92 50"
    fill="none" stroke="#67E8F9" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <path d="M 96 54 C 96 60 93 65 90 68"
    fill="none" stroke="#67E8F9" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <path d="M 87 74 C 84 78 80 80 78 83"
    fill="none" stroke="#67E8F9" stroke-width="1.6" stroke-linecap="round" opacity="0.6"/>
  <path d="M 93 42 C 88 38 84 38 82 42"
    fill="none" stroke="#67E8F9" stroke-width="1.4" stroke-linecap="round" opacity="0.5"/>

  <!-- BRAIN STEM (small rounded rectangle at bottom) -->
  <rect x="63" y="94" width="14" height="10" rx="5" fill="url(#brandGrad)" opacity="0.9"/>

  <!-- SMALL HIGHLIGHT DOT (top of brain, gives dimension) -->
  <circle cx="62" cy="30" r="3" fill="#C4B5FD" opacity="0.5"/>
  <circle cx="78" cy="30" r="3" fill="#A5F3FC" opacity="0.5"/>

  <!-- ═══ LIGHTNING BOLT (center icon overlay, subtle) ════════════════ -->
  <path
    d="M 72 40 L 66 62 L 71 62 L 68 82 L 74 58 L 69 58 Z"
    fill="url(#brandGrad)"
    opacity="0.25"
  />

  <!-- ═══ TEXT ══════════════════════════════════════════════════════════ -->

  <!-- "Brain" — bold white -->
  <text
    x="152" y="72"
    font-family="'Segoe UI', system-ui, -apple-system, Arial, sans-serif"
    font-weight="800"
    font-size="56"
    fill="white"
    letter-spacing="-2"
  >Brain</text>

  <!-- "Duel" — gradient, slightly lighter weight -->
  <text
    x="152" y="116"
    font-family="'Segoe UI', system-ui, -apple-system, Arial, sans-serif"
    font-weight="300"
    font-size="38"
    fill="url(#textGrad)"
    letter-spacing="12"
  >DUEL</text>

  <!-- Decorative separator line -->
  <line x1="152" y1="80" x2="518" y2="80" stroke="url(#brandGrad)" stroke-width="1" opacity="0.25"/>

  <!-- Small accent dots -->
  <circle cx="152" cy="128" r="3" fill="#7C3AED" opacity="0.8"/>
  <circle cx="162" cy="128" r="3" fill="#4F46E5" opacity="0.6"/>
  <circle cx="172" cy="128" r="3" fill="#06B6D4" opacity="0.8"/>

</svg>
