<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140" width="140" height="140">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3B1D8A"/>
      <stop offset="100%" stop-color="#0D1B2A"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#7C3AED" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Outer glow -->
  <circle cx="70" cy="70" r="67" fill="none" stroke="url(#brandGrad)" stroke-width="1" opacity="0.3"/>

  <!-- Background -->
  <circle cx="70" cy="70" r="62" fill="url(#bgGlow)" filter="url(#shadow)"/>

  <!-- Border -->
  <circle cx="70" cy="70" r="62" fill="none" stroke="url(#brandGrad)" stroke-width="3"/>

  <!-- Brain outer contour -->
  <path
    d="
      M 70 22
      C 82 22 92 28 96 37
      C 100 44 100 50 97 57
      C 94 64 94 68 96 74
      C 98 80 96 88 89 93
      C 84 97 78 98 74 97
      C 72 96 71 95 70 95
      C 69 95 68 96 66 97
      C 62 98 56 97 51 93
      C 44 88 42 80 44 74
      C 46 68 46 64 43 57
      C 40 50 40 44 44 37
      C 48 28 58 22 70 22 Z
    "
    fill="none"
    stroke="url(#brandGrad)"
    stroke-width="3"
    filter="url(#glow)"
  />

  <!-- Center division -->
  <line x1="70" y1="22" x2="70" y2="95" stroke="url(#brandGrad)" stroke-width="2.2" opacity="0.8" stroke-dasharray="3 2"/>

  <!-- Left folds -->
  <path d="M 53 32 C 48 36 46 42 48 50" fill="none" stroke="#A78BFA" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <path d="M 44 54 C 44 60 47 65 50 68" fill="none" stroke="#A78BFA" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <path d="M 53 74 C 56 78 60 80 62 83" fill="none" stroke="#A78BFA" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>

  <!-- Right folds -->
  <path d="M 87 32 C 92 36 94 42 92 50" fill="none" stroke="#67E8F9" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <path d="M 96 54 C 96 60 93 65 90 68" fill="none" stroke="#67E8F9" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <path d="M 87 74 C 84 78 80 80 78 83" fill="none" stroke="#67E8F9" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>

  <!-- Brain stem -->
  <rect x="63" y="94" width="14" height="10" rx="5" fill="url(#brandGrad)"/>

  <!-- Highlights -->
  <circle cx="62" cy="30" r="3.5" fill="#C4B5FD" opacity="0.6"/>
  <circle cx="78" cy="30" r="3.5" fill="#A5F3FC" opacity="0.6"/>
</svg>
